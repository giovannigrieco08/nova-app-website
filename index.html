<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova - App per Studenti</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      color: white;
      padding: 40px;
    }
    .logo {
      width: 120px;
      height: 120px;
      background: white;
      border-radius: 30px;
      margin: 0 auto 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      color: #667eea;
      font-weight: bold;
    }
    h1 { font-size: 48px; margin-bottom: 16px; }
    p { font-size: 20px; opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">N</div>
    <h1>Nova</h1>
    <p>La piattaforma social per studenti</p>
  </div>
</body>
</html>
