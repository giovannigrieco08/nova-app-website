<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Accedi a Nova</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 24px;
      padding: 40px 30px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 16px 32px;
      font-size: 17px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 14px;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }
    .btn:active {
      transform: translateY(0);
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #666;
      margin-top: 20px;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #eee;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .help {
      margin-top: 24px;
      font-size: 14px;
      color: #999;
    }
    .help a {
      color: #667eea;
      text-decoration: none;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">N</div>
    <h1>Benvenuto su Nova!</h1>

    <div id="loading-state">
      <p>Apertura dell'app in corso...</p>
      <div class="loading">
        <div class="spinner"></div>
        <span>Reindirizzamento...</span>
      </div>
    </div>

    <div id="manual-state" class="hidden">
      <p>Tocca il pulsante qui sotto per completare l'accesso nell'app Nova.</p>
      <a href="#" id="open-app-btn" class="btn">Apri Nova</a>
      <p class="help">
        Non hai l'app? <a href="https://apps.apple.com/app/nova/idXXXXXXXXX" target="_blank">Scaricala qui</a>
      </p>
    </div>
  </div>

  <script>
    (function() {
      // Get all URL parameters (code, token_hash, etc.)
      const params = window.location.search || '';
      const hash = window.location.hash || '';

      // Build the deep link URL
      // Try custom scheme first, then fallback
      const deepLink = 'novaapp://auth/callback' + params + hash;

      // Update the manual button
      const openBtn = document.getElementById('open-app-btn');
      openBtn.href = deepLink;

      // Try to open the app automatically
      let appOpened = false;

      // Method 1: Try location change
      window.location.href = deepLink;

      // Method 2: After a delay, show manual button
      // If the app opened, this page will be hidden/backgrounded
      setTimeout(function() {
        if (!appOpened && document.visibilityState !== 'hidden') {
          // App didn't open, show manual button
          document.getElementById('loading-state').classList.add('hidden');
          document.getElementById('manual-state').classList.remove('hidden');
        }
      }, 2500);

      // Track if page becomes hidden (app opened)
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'hidden') {
          appOpened = true;
        }
      });

      // Also try with iframe fallback for some browsers
      setTimeout(function() {
        if (!appOpened) {
          var iframe = document.createElement('iframe');
          iframe.style.display = 'none';
          iframe.src = deepLink;
          document.body.appendChild(iframe);
          setTimeout(function() {
            document.body.removeChild(iframe);
          }, 1000);
        }
      }, 500);
    })();
  </script>
</body>
</html>
